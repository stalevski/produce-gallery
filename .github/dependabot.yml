version: 2
updates:
  # JavaScript dependencies (Vite, React, Tailwind, lucide, etc.)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group minor + patch bumps together so we get one PR a week instead of ten
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions versions used in .github/workflows/
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(actions)"
