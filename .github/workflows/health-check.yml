name: Weekly health check

# Runs the smoke tests against the current main branch every Monday morning,
# even if no commits land that week. Catches drift from external dependencies
# (Wikidata schema, font CDNs that we'd missed self-hosting, deprecated GitHub
# Actions warnings, etc.) before someone notices the live site is broken.
#
# Free signal, ~2 minutes of CI a week. Failure emails the repo owner.

on:
  schedule:
    # 06:00 UTC every Monday. Cron in GitHub Actions uses UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc -b

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test
        env:
          CI: "true"

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
